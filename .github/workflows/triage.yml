name: Issue triaging

on:
  issues:
    types: [opened, labeled]

pull_request:
  types: [opened, labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.addLabels({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: ['triage'] 
          }).catch(() => {})